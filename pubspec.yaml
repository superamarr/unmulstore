name: pab
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_svg: ^2.2.4
  go_router: ^17.2.0
  google_fonts: ^8.0.2
  supabase_flutter: ^2.12.2
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1
  google_sign_in: ^6.2.2
  url_launcher: ^6.2.4
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
